import { gql } from '@apollo/client/core';

// Get current user information
export const ME_QUERY = gql`
  query Me {
    me {
      id
      username
      email
      firstName
      lastName
      isActive
      isStaff
      dateJoined
      profile {
        id
        phone
        address
        bio
        avatar
        preferences
        settings
        createdAt
        updatedAt
      }
    }
  }
`;

// Get profile history/audit trail
export const PROFILE_HISTORY_QUERY = gql`
  query ProfileHistory($userId: ID) {
    profileHistory(userId: $userId) {
      id
      phone
      address
      bio
      avatar
      preferences
      settings
      updateReason
      updatedBy {
        id
        username
        firstName
        lastName
      }
      deviceInfo
      changeType
      snapshotDate
      originalCreatedAt
      originalUpdatedAt
    }
  }
`;

// Update user profile
export const UPDATE_PROFILE_MUTATION = gql`
  mutation UpdateProfile($firstName: String, $lastName: String, $email: String, $phone: String, $address: String, $bio: String, $preferences: JSON, $update_reason: String, $change_type: String, $device_info: String) {
    updateProfile(firstName: $firstName, lastName: $lastName, email: $email, phone: $phone, address: $address, bio: $bio, preferences: $preferences, update_reason: $update_reason, change_type: $change_type, device_info: $device_info) {
      success
      message
      user {
        id
        username
        email
        firstName
        lastName
        isActive
        isStaff
        dateJoined
        profile {
          id
          phone
          address
          bio
          avatar
          preferences
          settings
          createdAt
          updatedAt
        }
      }
    }
  }
`;

// Update user email
export const UPDATE_EMAIL_MUTATION = gql`
  mutation UpdateEmail($email: String!, $password: String!) {
    updateEmail(email: $email, password: $password) {
      success
      message
      user {
        id
        username
        email
        firstName
        lastName
        isActive
        isStaff
        dateJoined
      }
    }
  }
`;

// Change user password
export const CHANGE_PASSWORD_MUTATION = gql`
  mutation ChangePassword($currentPassword: String!, $newPassword: String!) {
    changePassword(currentPassword: $currentPassword, newPassword: $newPassword) {
      success
      message
    }
  }
`;

// Update user preferences
export const UPDATE_PREFERENCES_MUTATION = gql`
  mutation UpdatePreferences($preferences: JSON!) {
    updatePreferences(preferences: $preferences) {
      success
      message
      user {
        id
        username
        email
        firstName
        lastName
        isActive
        isStaff
        dateJoined
        profile {
          id
          preferences
          updatedAt
        }
      }
    }
  }
`;

// Upload avatar
export const UPLOAD_AVATAR_MUTATION = gql`
  mutation UploadAvatar($file: Upload!) {
    uploadAvatar(file: $file) {
      success
      message
      avatarUrl
      user {
        id
        profile {
          id
          avatar
          updatedAt
        }
      }
    }
  }
`;

// Delete account
export const DELETE_ACCOUNT_MUTATION = gql`
  mutation DeleteAccount($password: String!) {
    deleteAccount(password: $password) {
      success
      message
    }
  }
`;

// Refresh token
export const REFRESH_TOKEN_MUTATION = gql`
  mutation RefreshToken {
    refreshToken {
      success
      message
      token
      refreshToken
      user {
        id
        username
        email
        firstName
        lastName
        isActive
        isStaff
        dateJoined
      }
    }
  }
`;
