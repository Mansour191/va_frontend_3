# Customer Segments GraphQL Queries and Mutations

# Query all customer segments
query GetCustomerSegments {
  customerSegments {
    id
    name
    description
    criteria
    criteriaRules
    isActive
    priority
    status
    lastSyncDate
    createdAt
    updatedAt
  }
}

# Query a single customer segment by ID
query GetCustomerSegment($id: ID!) {
  customerSegment(id: $id) {
    id
    name
    description
    criteria
    criteriaRules
    isActive
    priority
    status
    lastSyncDate
    createdAt
    updatedAt
  }
}

# Mutation to create a new customer segment
mutation CreateCustomerSegment($input: CustomerSegmentInput!) {
  createCustomerSegment(input: $input) {
    success
    message
    segment {
      id
      name
      description
      criteria
      criteriaRules
      isActive
      priority
      status
      lastSyncDate
      createdAt
      updatedAt
    }
    errors
  }
}

# Mutation to update an existing customer segment
mutation UpdateCustomerSegment($id: ID!, $input: CustomerSegmentInput!) {
  updateCustomerSegment(id: $id, input: $input) {
    success
    message
    segment {
      id
      name
      description
      criteria
      criteriaRules
      isActive
      priority
      status
      lastSyncDate
      createdAt
      updatedAt
    }
    errors
  }
}

# Query customer segment user relationships
query GetCustomerSegmentUsers($userId: ID, $segmentId: ID) {
  customerSegmentUsers(userId: $userId, segmentId: $segmentId) {
    id
    customersegment {
      id
      name
      description
      isActive
      priority
      status
    }
    user {
      id
      username
      email
      firstName
      lastName
    }
    joinedAt
    addedByAi
    engagementScore
  }
}

# Query a single customer segment user relationship
query GetCustomerSegmentUser($id: ID!) {
  customerSegmentUser(id: $id) {
    id
    customersegment {
      id
      name
      description
      isActive
      priority
      status
    }
    user {
      id
      username
      email
      firstName
      lastName
    }
    joinedAt
    addedByAi
    engagementScore
  }
}

# Mutation to assign user to segment
mutation AssignUserToSegment($input: CustomerSegmentUserInput!) {
  assignUserToSegment(input: $input) {
    success
    message
    customerSegmentUser {
      id
      customersegment {
        id
        name
      }
      user {
        id
        username
      }
      joinedAt
      addedByAi
      engagementScore
    }
    errors
  }
}

# Mutation to update customer segment user relationship
mutation UpdateCustomerSegmentUser($id: ID!, $input: CustomerSegmentUserInput!) {
  updateCustomerSegmentUser(id: $id, input: $input) {
    success
    message
    customerSegmentUser {
      id
      customersegment {
        id
        name
      }
      user {
        id
        username
      }
      joinedAt
      addedByAi
      engagementScore
    }
    errors
  }
}

# Mutation to remove user from segment
mutation RemoveUserFromSegment($id: ID!) {
  removeUserFromSegment(id: $id) {
    success
    message
    errors
  }
}

# Input type for customer segment operations
fragment CustomerSegmentInput on CustomerSegmentInput {
  name
  description
  criteria
  criteriaRules
  isActive
  priority
  status
  lastSyncDate
}

# Input type for customer segment user operations
fragment CustomerSegmentUserInput on CustomerSegmentUserInput {
  customersegmentId
  userId
  addedByAi
  engagementScore
}
