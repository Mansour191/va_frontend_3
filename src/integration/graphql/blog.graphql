import { gql } from '@apollo/client/core';

// Get all blog posts
export const BLOG_POSTS_QUERY = gql`
  query GetBlogPosts($first: Int, $after: String, $category: String) {
    blogPosts(first: $first, after: $after, category: $category) {
      edges {
        node {
          id
          title
          excerpt
          imageUrl
          content
          createdAt
          updatedAt
          views
          commentsCount
          category {
            id
            name
            value
          }
          author {
            id
            name
            username
          }
        }
        cursor
      }
      pageInfo {
        hasNextPage
        hasPreviousPage
        startCursor
        endCursor
      }
      totalCount
    }
  }
`;

// Get blog post by ID
export const BLOG_POST_QUERY = gql`
  query GetBlogPost($id: ID!) {
    blogPost(id: $id) {
      id
      title
      excerpt
      imageUrl
      content
      createdAt
      updatedAt
      views
      commentsCount
      category {
        id
        name
        value
      }
      author {
        id
        name
        username
      }
    }
  }
`;

