// Create blog post mutation (admin only)
export const CREATE_BLOG_POST_MUTATION = gql`
  mutation CreateBlogPost(
    $title: String!
    $excerpt: String!
    $content: String!
    $imageUrl: String
    $categoryId: ID
    $authorId: ID
  ) {
    createBlogPost(
      title: $title
      excerpt: $excerpt
      content: $content
      imageUrl: $imageUrl
      categoryId: $categoryId
      authorId: $authorId
    ) {
      success
      message
      blogPost {
        id
        title
        excerpt
        imageUrl
        content
        createdAt
        updatedAt
        views
        commentsCount
        category {
          id
          name
          value
        }
        author {
          id
          name
          username
        }
      }
    }
  }
`;

