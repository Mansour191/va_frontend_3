import { gql } from '@apollo/client/core';
import {
  ORDER_BASIC_FRAGMENT,
  ORDER_DETAILS_FRAGMENT,
  ORDER_ITEM_BASIC_FRAGMENT,
  USER_BASIC_FRAGMENT,
  PRODUCT_ESSENTIAL_FRAGMENT,
  PRODUCT_IMAGES_FRAGMENT,
  MATERIAL_BASIC_FRAGMENT,
  PAGE_INFO_FRAGMENT,
  TIMESTAMPS_FRAGMENT
} from './fragments.graphql';

// Get all orders query
export const GET_ORDERS_QUERY = gql`
  query GetOrders($first: Int = 50, $after: String, $status: String) {
    orders(first: $first, after: $after, status: $status) {
      edges {
        node {
          id
          orderNumber
          customerName
          phone
          email
          totalAmount
          subtotal
          shippingAmount
          taxAmount
          status
          paymentMethod
          paymentStatus
          createdAt
          updatedAt
          shippingAddress {
            street
            city
            wilaya
            country
          }
        }
        cursor
      }
      pageInfo {
        hasNextPage
        hasPreviousPage
        startCursor
        endCursor
      }
      totalCount
    }
  }
`;

// Create order mutation (using fragments)
export const CREATE_ORDER_MUTATION = gql`
  mutation CreateOrder($input: OrderInput!, $items: [OrderItemInput!]!) {
    createOrder(input: $input, items: $items) {
      success
      message
      order {
        id
        orderNumber
        user {
          ...UserBasic
        }
        customerName
        phone
        email
        shippingAddress
        wilaya {
          id
          wilayaId
          nameAr
          nameFr
        }
        subtotal
        shippingCost
        tax
        discountAmount
        totalAmount
        status
        paymentMethod
        paymentStatus
        notes
        syncStatus
        erpnextSalesOrderId
        createdAt
        updatedAt
        items {
          id
          product {
            ...ProductEssential
            images {
              ...ProductImages
            }
          }
          material {
            ...MaterialBasic
          }
          quantity
          price
          width
          height
          dimensionUnit
          marbleTexture
          customDesign
        }
        timeline {
          id
          status
          note
          createdAt
        }
      }
    }
  }
  ${USER_BASIC_FRAGMENT}
  ${PRODUCT_ESSENTIAL_FRAGMENT}
  ${PRODUCT_IMAGES_FRAGMENT}
  ${MATERIAL_BASIC_FRAGMENT}
`;

// Get user orders (using fragments)
export const USER_ORDERS_QUERY = gql`
  query GetUserOrders($filter: OrderFilterInput, $first: Int, $after: String, $orderBy: String) {
    userOrders(filter: $filter, first: $first, after: $after, orderBy: $orderBy) {
      pageInfo {
        ...PageInfo
      }
      edges {
        node {
          ...OrderDetails
        }
        cursor
      }
    }
  }
  ${ORDER_DETAILS_FRAGMENT}
  ${PAGE_INFO_FRAGMENT}
`;

// Get my orders (simplified for OrderHistory - using fragments)
export const MY_ORDERS_QUERY = gql`
  query GetMyOrders($page: Int, $limit: Int) {
    myOrders(page: $page, limit: $limit) {
      ...OrderDetails
    }
    myOrdersCount
  }
  ${ORDER_DETAILS_FRAGMENT}
`;

