// Add timeline step
export const ADD_TIMELINE_STEP_MUTATION = gql`
  mutation AddTimelineStep($orderId: ID!, $status: String!, $note: String, $isAutomatic: Boolean, $metadata: JSON) {
    addTimelineStep(orderId: $orderId, status: $status, note: $note, isAutomatic: $isAutomatic, metadata: $metadata) {
      success
      message
      timelineEntry {
        id
        status
        note
        createdAt
        createdBy {
          id
          username
          firstName
          lastName
        }
        isAutomatic
        metadata
      }
    }
  }
`;

// Get timeline statistics
export const TIMELINE_STATS_QUERY = gql`
