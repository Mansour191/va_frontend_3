// Get order statistics
export const ORDER_STATS_QUERY = gql`
  query GetOrderStats($dateFrom: String, $dateTo: String) {
    orderStats(dateFrom: $dateFrom, dateTo: $dateTo) {
      totalOrders
      totalRevenue
      ordersByStatus {
        status
        count
        revenue
      }
      ordersByPaymentMethod {
        method
        count
        revenue
      }
      ordersByWilaya {
        wilaya {
          id
          nameAr
          nameFr
        }
        count
        revenue
      }
    }
  }
`;

