// Get gallery items
export const GALLERY_ITEMS_QUERY = gql`
  query GetGalleryItems($category: String, $first: Int, $after: String) {
    galleryItems(category: $category, first: $first, after: $after) {
      edges {
        node {
          id
          title
          image
          category {
            id
            name
            slug
          }
          description
          tags
          featured
          createdAt
        }
        cursor
      }
      pageInfo {
        hasNextPage
        hasPreviousPage
        startCursor
        endCursor
      }
      totalCount
    }
  }
`;

