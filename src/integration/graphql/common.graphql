import { gql } from '@apollo/client/core';

// Common utility queries and mutations

// Get site statistics
export const SITE_STATISTICS_QUERY = gql`
  query GetSiteStatistics {
    siteStatistics {
      totalProducts
      totalCategories
      totalPages
      totalUsers
      totalOrders
      activeUsers
      revenue
      growth
    }
  }
`;

// Get dashboard statistics
export const DASHBOARD_STATISTICS_QUERY = gql`
  query GetDashboardStatistics {
    dashboardStatistics {
      totalRevenue
      totalOrders
      totalCustomers
      totalProducts
      recentOrders {
        id
        orderNumber
        status
        total
        createdAt
        customer {
          name
          email
        }
      }
      topProducts {
        id
        name
        sales
        revenue
        image
      }
      monthlyRevenue {
        month
        revenue
        orders
      }
    }
  }
`;

// Get countries
export const COUNTRIES_QUERY = gql`
  query GetCountries {
