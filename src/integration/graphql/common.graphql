// Calculate shipping cost
export const CALCULATE_SHIPPING_MUTATION = gql`
  mutation CalculateShipping($input: ShippingCalculationInput!) {
    calculateShipping(input: $input) {
      success
      message
      shippingCost
      estimatedDelivery
      availableMethods {
        id
        name
        cost
        estimatedDelivery
      }
    }
  }
`;

// Admin broadcast mutation
export const ADMIN_BROADCAST_MUTATION = gql`
  mutation AdminBroadcast($input: BroadcastInput!) {
    adminBroadcast(input: $input) {
      success
      message
      broadcast {
        id
        title
        message
        type
        targetAudience
        scheduledAt
        sentAt
        status
      }
    }
  }
`;

