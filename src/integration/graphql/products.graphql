// Product by ID with Display Level (for product detail pages)
export const PRODUCT_BY_ID_QUERY = gql`
  query GetProductById($id: ID!) {
    product(id: $id) {
      ...ProductDisplay
    }
  }
  ${PRODUCT_DISPLAY_FRAGMENT}
`;

// Product by Slug with Display Level (for SEO pages)
export const PRODUCT_BY_SLUG_QUERY = gql`
  query GetProductBySlug($slug: String!) {
    products(filter: { slug: $slug }) {
      edges {
        node {
          ...ProductDisplay
        }
        cursor
      }
    }
  }
  ${PRODUCT_DISPLAY_FRAGMENT}
`;

// Level-based Product Queries

// Essential Level (8 fields) - For main lists and cards
export const PRODUCTS_ESSENTIAL_QUERY = gql`
  query GetProductsEssential($filter: ProductsFilterInput, $first: Int, $after: String, $orderBy: String) {
    products(filter: $filter, first: $first, after: $after, orderBy: $orderBy) {
      edges {
        node {
          ...ProductEssential
          category {
            ...CategoryBasic
          }
          images {
            ...ProductImages
          }
        }
        cursor
      }
      pageInfo {
        ...PageInfo
      }
      totalCount
    }
  }
  ${PRODUCT_ESSENTIAL_FRAGMENT}
  ${CATEGORY_BASIC_FRAGMENT}
  ${PRODUCT_IMAGES_FRAGMENT}
  ${PAGE_INFO_FRAGMENT}
`;

