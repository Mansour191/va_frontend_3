// Search Products (Search Level - includes description for search relevance)
export const SEARCH_PRODUCTS_QUERY = gql`
  query SearchProducts($searchTerm: String!, $first: Int, $after: String, $filter: ProductsFilterInput) {
  products(
    filter: { 
      nameAr_Icontains: $searchTerm, 
      nameEn_Icontains: $searchTerm,
      descriptionAr_Icontains: $searchTerm,
      descriptionEn_Icontains: $searchTerm,
      isActive: true,
      ...$filter
    }, 
    first: $first
    after: $after
    orderBy: "-createdAt"
  ) {
    edges {
      node {
        ...ProductEssential
        category {
          ...CategoryBasic
        }
        images {
          ...ProductImages
        }
        descriptionAr
        tags
      }
      cursor
    }
    pageInfo {
      ...PageInfo
    }
    totalCount
  }
}
  ${PRODUCT_ESSENTIAL_FRAGMENT}
  ${CATEGORY_BASIC_FRAGMENT}
  ${PRODUCT_IMAGES_FRAGMENT}
  ${PAGE_INFO_FRAGMENT}
`;

