// ProductVariant Mutations (using fragments)
export const CREATE_PRODUCT_VARIANT_MUTATION = gql`
  mutation CreateProductVariant(
    $productId: ID!
    $name: String!
    $sku: String!
    $price: Float!
    $stock: Int
    $attributes: JSONString
    $isActive: Boolean
  ) {
    createProductVariant(
      productId: $productId
      name: $name
      sku: $sku
      price: $price
      stock: $stock
      attributes: $attributes
      isActive: $isActive
    ) {
      success
      message
      productVariant {
        ...ProductVariant
        createdAt
        updatedAt
        product {
          ...ProductEssential
        }
      }
    }
  }
  ${PRODUCT_VARIANT_FRAGMENT}
  ${PRODUCT_ESSENTIAL_FRAGMENT}
`;

export const UPDATE_PRODUCT_VARIANT_MUTATION = gql`
  mutation UpdateProductVariant(
    $id: ID!
    $name: String
    $sku: String
    $price: Float
    $stock: Int
    $attributes: JSONString
    $isActive: Boolean
  ) {
    updateProductVariant(
      id: $id
      name: $name
      sku: $sku
      price: $price
      stock: $stock
      attributes: $attributes
      isActive: $isActive
    ) {
      success
      message
      productVariant {
        ...ProductVariant
        createdAt
        updatedAt
        product {
          ...ProductEssential
        }
      }
    }
  }
  ${PRODUCT_VARIANT_FRAGMENT}
  ${PRODUCT_ESSENTIAL_FRAGMENT}
`;

export const DELETE_PRODUCT_VARIANT_MUTATION = gql`
  mutation DeleteProductVariant($id: ID!) {
    deleteProductVariant(id: $id) {
      success
      message
    }
  }
`;

// Product Material Mutations (using fragments)
export const ADD_MATERIAL_TO_PRODUCT_MUTATION = gql`
  mutation AddMaterialToProduct(
    $productId: ID!
    $materialId: ID!
    $quantityUsed: Float
    $unit: String
  ) {
    addMaterialToProduct(
      productId: $productId
      materialId: $materialId
      quantityUsed: $quantityUsed
      unit: $unit
    ) {
      success
      message
      product {
        ...ProductEssential
        materials {
          ...MaterialBasic
        }
      }
    }
  }
  ${PRODUCT_ESSENTIAL_FRAGMENT}
  ${MATERIAL_BASIC_FRAGMENT}
`;

export const REMOVE_MATERIAL_FROM_PRODUCT_MUTATION = gql`
  mutation RemoveMaterialFromProduct(
