import { gql } from '@apollo/client/core';

// Send notification mutation
export const SEND_NOTIFICATION_MUTATION = gql`
  mutation SendNotification($input: NotificationInput!) {
    sendNotification(input: $input) {
      success
      message
      notification {
        id
        title
        message
        type
        userId
        read
        createdAt
      }
    }
  }
`;

// Get unread notifications query
export const GET_UNREAD_NOTIFICATIONS_QUERY = gql`
  query GetUnreadNotifications($userId: ID!) {
    unreadNotifications(userId: $userId) {
      id
      title
      message
      type
      read
      createdAt
    }
  }
`;

// Mark notification as read mutation
export const MARK_NOTIFICATION_READ_MUTATION = gql`
  mutation MarkNotificationRead($notificationId: ID!) {
    markNotificationRead(notificationId: $notificationId) {
      success
      message
    }
  }
`;
