import { gql } from '@apollo/client/core';

// ========================================
// PRODUCT FRAGMENTS
// ========================================

// Essential Product Info (8 fields) - For lists and cards
export const PRODUCT_ESSENTIAL_FRAGMENT = gql`
  fragment ProductEssential on Product {
    id
    nameAr
    nameEn
    slug
    basePrice
    onSale
    discountPercent
    isActive
  }
`;

// Product Display Info (15 fields) - For product detail pages
export const PRODUCT_DISPLAY_FRAGMENT = gql`
  fragment ProductDisplay on Product {
    id
    nameAr
    nameEn
    slug
    descriptionAr
    basePrice
    onSale
    discountPercent
    isActive
    stock
    category {
      ...CategoryBasic
    }
    images {
      ...ProductImages
    }
  }
`;

// Product Details (25 fields) - Optimized for detail pages
export const PRODUCT_DETAILS_FRAGMENT = gql`
  fragment ProductDetails on Product {
    id
    nameAr
    nameEn
    slug
    descriptionAr
    descriptionEn
    basePrice
    cost
    category {
      ...CategoryFull
    }
    onSale
    discountPercent
    isFeatured
    isNew
    isActive
    stock
    weight
    dimensions
    tags
    seoTitle
    seoDescription
    images {
      ...ProductImagesFull
    }
    variants {
      ...ProductVariant
    }
    materials {
      ...MaterialBasic
    }
  }
`;

// Full Product Details (49 fields) - Restricted to admin only, max 20 items
export const PRODUCT_FULL_FRAGMENT = gql`
  fragment ProductFull on Product {
    id
    nameAr
    nameEn
    slug
    descriptionAr
    descriptionEn
    basePrice
    cost
    category {
      ...CategoryFull
    }
    onSale
    discountPercent
    isFeatured
    isNew
    isActive
    stock
    weight
    dimensions
    tags
    seoTitle
    seoDescription
    syncStatus
    erpnextItemCode
    syncError
    lastSyncedAt
    createdAt
    updatedAt
    images {
      ...ProductImagesFull
    }
    variants {
      ...ProductVariant
    }
    materials {
      ...MaterialBasic
    }
  }
`;

// Product Images (3 fields) - For lists
export const PRODUCT_IMAGES_FRAGMENT = gql`
  fragment ProductImages on Product {
    images {
      id
      imageUrl
      isMain
    }
  }
`;

// Full Product Images (5 fields) - For details
export const PRODUCT_IMAGES_FULL_FRAGMENT = gql`
  fragment ProductImagesFull on Product {
    images {
      id
      imageUrl
      altText
      isMain
      sortOrder
    }
  }
`;

