// ========================================
// COMBINED FRAGMENTS
// ========================================

// Product for Shop List (Essential + Category + Images)
export const PRODUCT_SHOP_LIST_FRAGMENT = gql`
  fragment ProductShopList on Product {
    ...ProductEssential
    category {
      ...CategoryBasic
    }
    images {
      ...ProductImages
    }
  }
  ${PRODUCT_ESSENTIAL_FRAGMENT}
  ${CATEGORY_BASIC_FRAGMENT}
  ${PRODUCT_IMAGES_FRAGMENT}
`;

// Product for Featured Section
export const PRODUCT_FEATURED_FRAGMENT = gql`
  fragment ProductFeatured on Product {
    ...ProductEssential
    category {
      ...CategoryBasic
    }
    images {
      ...ProductImages
    }
    discountPercent
    isFeatured
    isNew
  }
  ${PRODUCT_ESSENTIAL_FRAGMENT}
  ${CATEGORY_BASIC_FRAGMENT}
  ${PRODUCT_IMAGES_FRAGMENT}
`;

// Product for Search Results
export const PRODUCT_SEARCH_FRAGMENT = gql`
  fragment ProductSearch on Product {
    ...ProductEssential
    category {
      ...CategoryBasic
    }
    images {
      ...ProductImages
    }
    descriptionAr
    tags
  }
  ${PRODUCT_ESSENTIAL_FRAGMENT}
  ${CATEGORY_BASIC_FRAGMENT}
  ${PRODUCT_IMAGES_FRAGMENT}
`;
